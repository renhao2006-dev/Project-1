<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h2>Text Input Fields</h2>
    <form>
        <label for="name">First Name : </label><br>
        <input type="text" name="name"><br>
        <label for="lname">Last Name : </label><br>
        <input type="text" name="lname">
    </form>
    

    <br><br><br>
    <h2>Text Area</h2>
    <form>
        <textarea name="comments" rows="10" cols="60"></textarea>
        <br>
        <input type="submit" value="Submit">
    </form>


    <br><br><br>
    <h2>Radio Button</h2>
    <form>
        <input type="radio" name="fav_language" value="HTML">
        <label for="html">HTML</label><br>
        <input type="radio" name="fav_language" value="CSS">
        <label for="CSS">CSS</label><br>
        <input type="radio" name="fav_language" value="JavaScript">
        <label for="JavaScript">JavaScript</label>
    </form>


    <br><br><br>
    <h2>Checkbox</h2>
    <form>
        <input type="checkbox" name="fav_language" value="HTML">
        <label for="html">HTML</label><br>
        <input type="checkbox" name="fav_language" value="CSS">
        <label for="CSS">CSS</label><br>
        <input type="checkbox" name="fav_language" value="JavaScript">
        <label for="JavaScript">JavaScript</label>
    </form>


    <br><br><br>
    <h2>Dropdown List</h2>
    <form>
        <label for="prog">Choose A Programme</label>
        <select name="prog" id="prog">
            <option value="DIIT">Diploma In Information Technology</option>
            <option value="DCSI">Diploma In Computer Science</option>
            <option value="DCOM">Diploma In Communication</option>
    </form>

    <p>Testing 1</p>

    <p>Testing 2</p>

</body>
</html>
